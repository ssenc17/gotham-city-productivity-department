<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>gcpd</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="gotham-container">
    
    <img src="assets_ms-paint/sky.png" class="layer sky" alt="sky">
    <img src="assets_ms-paint/moon.png" class="layer moon" alt="moon">
    
    <div class="clouds-wrapper">
      <div class="clouds-track"></div>
    </div>

    <img src="assets_ms-paint/skyline.png" class="layer skyline" alt="skyline">

    <img src="assets_ms-paint/twinkle-a.png" class="layer twinkle twinkle-1" alt="windows A">
    <img src="assets_ms-paint/twinkle-b.png" class="layer twinkle twinkle-2" alt="windows B">
    <img src="assets_ms-paint/twinkle-c.png" class="layer twinkle twinkle-3" alt="windows C">

    <input type="checkbox" id="signal-toggle" class="signal-trigger-input">
    <img src="assets_ms-paint/beam.png" class="layer bat-beam" alt="batsignal beam">

    <label for="signal-toggle" class="projector-click-box">
      <img src="assets_ms-paint/signal-off.png" class="projector-img off-state" alt="signal off">
      <img src="assets_ms-paint/signal-on.png" class="projector-img on-state" alt="signal on">
    </label>

    <img src="assets_ms-paint/ledge.png" class="layer ledge" alt="ledge">
    
  </div>

</body>
</html>
